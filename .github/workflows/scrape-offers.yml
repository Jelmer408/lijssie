name: Weekly Supermarket Offers Scraper

on:
  schedule:
    # Run every Monday and Wednesday at 01:00 UTC
    - cron: '0 1 * * 1,3'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Set maximum job duration
    env:
      SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=4096" # Increase Node.js memory limit

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser xvfb

      - name: Setup virtual display
        run: |
          Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Clear sale recommendations
        run: |
          echo "Clearing sale recommendations..."
          npx tsx -e "
            import { createClient } from '@supabase/supabase-js';
            const supabase = createClient(
              process.env.SUPABASE_URL!,
              process.env.SUPABASE_KEY!
            );
            async function clearRecommendations() {
              const { error } = await supabase
                .from('sale_recommendations')
                .delete()
                .neq('id', 0); // Delete all rows
              if (error) {
                console.error('Error clearing recommendations:', error);
                process.exit(1);
              }
              console.log('Successfully cleared sale recommendations');
            }
            clearRecommendations();
          "

      - name: Run scraper
        run: |
          echo "Using Supabase URL: ${SUPABASE_URL:0:15}..."
          npx tsx src/scripts/scrape-offers.ts
        continue-on-error: true # Continue even if one supermarket fails
        timeout-minutes: 20 # Set timeout for scraping

      - name: Generate embeddings
        run: |
          echo "Generating embeddings for new offers..."
          npx tsx src/scripts/generate-embeddings.ts
        timeout-minutes: 10 # Set timeout for embedding generation

      - name: Handle errors
        if: failure()
        run: |
          echo "Scraping or embedding generation failed. Check the logs for details."
          exit 1 